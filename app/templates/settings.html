{% extends "base.html" %}

{% block title %}设置 - WQ Consultant{% endblock %}
{% block header_title %}系统全局设置{% endblock %}

{% block content %}
<div class="settings-container">
    <form id="settings-form" action="/api/settings/update" method="POST" class="settings-form">
        
        <!-- SECTION 1: ADMIN ACCOUNT -->
        <div class="card settings-card">
            <div class="card-header">
                <h2><i class="fa-solid fa-user-gear"></i> GUI 管理员账户密码</h2>
            </div>
            <div class="card-body form-grid">
                <div class="form-group full-width">
                    <label for="admin_password">修改管理员密码</label>
                    <input type="password" id="admin_password" name="admin_password" placeholder="留空代表不修改密码">
                    <small class="form-help">修改后下次登录将使用新密码。</small>
                </div>
            </div>
        </div>

        <!-- SECTION 2: WORLDQUANT BRAIN CREDENTIALS -->
        <div class="card settings-card">
            <div class="card-header">
                <h2><i class="fa-solid fa-key"></i> WorldQuant Brain 账号凭据配置</h2>
                <div class="card-actions">
                    <button type="button" class="btn btn-sm btn-secondary" onclick="importCredentials()">一键从 credentials.json 导入</button>
                    <button type="button" class="btn btn-sm btn-primary" id="btn-test-credentials" onclick="testCredentials()"><i class="fa-solid fa-plug"></i> 测试登录</button>
                </div>
            </div>
            <div class="card-body form-grid">
                <div class="form-group">
                    <label for="wq_username">账号 (Email/Username)</label>
                    <input type="text" id="wq_username" name="wq_username" value="{{ settings.wq_username or '' }}" placeholder="请输入您的 WQ 邮箱">
                </div>
                <div class="form-group" style="position: relative;">
                    <label for="wq_password">密码 (Password)</label>
                    <div class="password-wrapper">
                        <input type="password" id="wq_password" name="wq_password" value="{{ settings.wq_password or '' }}" placeholder="请输入您的 WQ 密码" style="width: 100%;">
                        <i class="fa-solid fa-eye-slash" id="toggle-wq-password" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); z-index: 5;"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- SECTION 3: LIMITS & BLOCKED WINDOWS -->
        <div class="card settings-card">
            <div class="card-header">
                <h2><i class="fa-solid fa-gauge-high"></i> 系统限额与全局禁用时间窗</h2>
            </div>
            <div class="card-body form-grid">
                <div class="form-group">
                    <label for="backtest_daily_limit">回测每日参考上限</label>
                    <input type="number" id="backtest_daily_limit" name="backtest_daily_limit" value="{{ settings.backtest_daily_limit or '4500' }}">
                </div>
                <div class="form-group">
                    <label for="poll_minutes">每日限制后重新扫描间隔 (分钟)</label>
                    <input type="number" id="poll_minutes" name="poll_minutes" value="{{ settings.poll_minutes or '20' }}">
                </div>
                <div class="form-group">
                    <label for="blocked_start_cn">中国时间禁用段开始 (如 08:30)</label>
                    <input type="time" id="blocked_start_cn" name="blocked_start_cn" value="{{ settings.blocked_start_cn or '00:00' }}">
                </div>
                <div class="form-group">
                    <label for="blocked_end_cn">中国时间禁用段结束 (如 15:00)</label>
                    <input type="time" id="blocked_end_cn" name="blocked_end_cn" value="{{ settings.blocked_end_cn or '00:00' }}">
                </div>
            </div>
        </div>

        <!-- SECTION 4: NETWORK RECONNECTS & INTERACTIONS -->
        <div class="card settings-card">
            <div class="card-header">
                <h2><i class="fa-solid fa-gears"></i> 系统高级与重连交互</h2>
            </div>
            <div class="card-body form-grid">
                <div class="form-group">
                    <label for="reconnect_short_sleep_seconds">网络异常第 1~2 次等待重连 (秒)</label>
                    <input type="number" id="reconnect_short_sleep_seconds" name="reconnect_short_sleep_seconds" value="{{ settings.reconnect_short_sleep_seconds or '300' }}">
                </div>
                <div class="form-group">
                    <label for="reconnect_long_sleep_seconds">网络异常第 3 次及以后等待重连 (秒)</label>
                    <input type="number" id="reconnect_long_sleep_seconds" name="reconnect_long_sleep_seconds" value="{{ settings.reconnect_long_sleep_seconds or '600' }}">
                </div>
                <div class="form-group">
                    <label for="need_confirm_on_modify">敏感属性变更时启用二次点击确认</label>
                    <select id="need_confirm_on_modify" name="need_confirm_on_modify">
                        <option value="0" {% if settings.need_confirm_on_modify == '0' %}selected{% endif %}>关闭</option>
                        <option value="1" {% if settings.need_confirm_on_modify == '1' %}selected{% endif %}>开启 (修改保存提示)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg">确认保存配置</button>
        </div>
    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // 1. 密码明文/密文切换
    const toggleWqPassword = document.getElementById("toggle-wq-password");
    const wqPasswordInput = document.getElementById("wq_password");
    if (toggleWqPassword && wqPasswordInput) {
        toggleWqPassword.addEventListener("click", function() {
            if (wqPasswordInput.type === "password") {
                wqPasswordInput.type = "text";
                toggleWqPassword.classList.remove("fa-eye-slash");
                toggleWqPassword.classList.add("fa-eye");
            } else {
                wqPasswordInput.type = "password";
                toggleWqPassword.classList.remove("fa-eye");
                toggleWqPassword.classList.add("fa-eye-slash");
            }
        });
    }

    // 2. AJAX 异步保存或安全提问
    const form = document.getElementById("settings-form");
    if (form) {
        form.addEventListener("submit", function(e) {
            const needConfirm = document.getElementById("need_confirm_on_modify") ? document.getElementById("need_confirm_on_modify").value === "1" : false;
            if (needConfirm && !confirm("确定要保存修改后的系统配置属性吗？")) {
                e.preventDefault();
                return;
            }
        });
    }
});

function testCredentials() {
    const usernameInput = document.getElementById("wq_username");
    const passwordInput = document.getElementById("wq_password");
    if (!usernameInput || !passwordInput) return;

    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();

    if (!username || !password) {
        showToast("请输入 WorldQuant 账号和密码后再进行测试", "error");
        return;
    }

    const btn = document.getElementById("btn-test-credentials");
    let originalText = "";
    if (btn) {
        originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 测试中...';
    }

    const formData = new FormData();
    formData.append("wq_username", username);
    formData.append("wq_password", password);

    fetch("/api/settings/test_credentials", {
        method: "POST",
        body: formData
    })
    .then(res => {
        if (!res.ok) {
            throw new Error(`HTTP 错误: ${res.status}`);
        }
        return res.json();
    })
    .then(data => {
        if (data.status === "ok") {
            showToast(data.message || "测试登录成功，凭据正确！", "success");
        } else {
            showToast(data.message || "测试登录失败", "error");
        }
    })
    .catch(err => {
        showToast("请求发生错误: " + err.message, "error");
    })
    .finally(() => {
        if (btn) {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    });
}
</script>
{% endblock %}
