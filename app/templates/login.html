<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - WorldQuant Consultant GUI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fa-solid fa-brain login-logo"></i>
                <h2>WQ Consultant</h2>
                <p>本地工作流任务管理平台</p>
            </div>
            
            <form action="/login" method="POST" class="login-form">
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="请输入管理员密码" required autofocus>
                    </div>
                </div>
                
                {% if error %}
                <div class="login-error">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>{{ error }}</span>
                </div>
                {% endif %}
                
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>
            
            <div class="login-footer">
                <p>提示：默认密码是 <code>admin</code>。首次登录后请前往设置页修改。</p>
            </div>
        </div>
    </div>
</body>
</html>
